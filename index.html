<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nagaria Textiles - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #f3e7e9, #e6f0ff); }
    .card { background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="card w-full max-w-md rounded-2xl p-8">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Nagaria Textiles</h1>
      <p class="text-gray-600 mt-2">IT Support Portal</p>
    </div>

    <!-- Step 1: Email -->
    <div id="step-email">
      <h2 class="text-xl font-semibold mb-4">Sign In</h2>
      <p class="text-gray-600 mb-6">Enter your company email</p>
      
      <input type="email" id="email" 
             class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
             placeholder="yourname@nagariatextiles.com">

      <button onclick="requestOTP()" 
              class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-medium">
        Send OTP
      </button>
    </div>

    <!-- Step 2: OTP + Username -->
    <div id="step-otp" class="hidden">
      <h2 class="text-xl font-semibold mb-2">Verification</h2>
      <p class="text-gray-600 mb-4">Enter OTP sent to <span id="display-email" class="font-medium"></span></p>

      <input type="text" id="otp" maxlength="6"
             class="w-full px-4 py-3 border border-gray-300 rounded-lg text-center text-2xl tracking-widest focus:outline-none focus:border-blue-500"
             placeholder="123456">

      <input type="text" id="username" 
             class="w-full mt-4 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
             placeholder="Your full name / username">

      <button onclick="verifyOTP()" 
              class="w-full mt-6 bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-medium">
        Verify & Login
      </button>

      <button onclick="goBack()" 
              class="w-full mt-3 text-gray-600 hover:text-gray-800 py-2">
        ← Change Email
      </button>
    </div>

    <div id="message" class="mt-6 text-center font-medium"></div>
  </div>

<script>
let currentEmail = "";

// Auto-login check when page loads
async function checkAutoLogin() {
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || '{}');

  if (token && user.role === "ADMINISTRATOR") {
    window.location.href = "/dashboard.html";
  }
}

checkAutoLogin(); // Run on page load

async function requestOTP() {
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('message');

  if (!email.endsWith('@nagariatextiles.com')) {
    msg.style.color = 'red';
    msg.textContent = "Only @nagariatextiles.com emails are allowed";
    return;
  }

  currentEmail = email;

  try {
    const res = await fetch('http://127.0.0.1:5000/request-otp', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email})
    });

    const data = await res.json();

    if (res.ok) {
      msg.style.color = 'green';
      msg.textContent = "✅ OTP sent! Check your email.";
      document.getElementById('step-email').classList.add('hidden');
      document.getElementById('step-otp').classList.remove('hidden');
      document.getElementById('display-email').textContent = email;
    } else {
      msg.style.color = 'red';
      msg.textContent = data.error || "Failed to send OTP";
    }
  } catch (e) {
    msg.style.color = 'red';
    msg.textContent = "Cannot connect to server. Is Flask running?";
  }
}

async function verifyOTP() {
  const otp = document.getElementById('otp').value.trim();
  const username = document.getElementById('username').value.trim();
  const msg = document.getElementById('message');

  if (!otp || !username) {
    msg.style.color = 'red';
    msg.textContent = "Please enter OTP and username";
    return;
  }

  try {
    const res = await fetch('http://127.0.0.1:5000/verify-otp', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: currentEmail, otp, username})
    });

    const data = await res.json();

    if (res.ok) {
      msg.style.color = 'green';
      msg.textContent = `✅ Welcome, ${username}!`;

      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data));

      // Auto redirect ONLY for Administrators
      if (data.role === "ADMINISTRATOR") {
        setTimeout(() => {
          window.location.href = "/dashboard.html";
        }, 800);
      } else {
        alert(`Login successful!\nRole: ${data.role}\n\nWelcome to the portal.`);
      }
    } else {
      msg.style.color = 'red';
      msg.textContent = data.error || "Verification failed";
    }
  } catch (e) {
    msg.style.color = 'red';
    msg.textContent = "Connection error";
  }
}

function goBack() {
  document.getElementById('step-otp').classList.add('hidden');
  document.getElementById('step-email').classList.remove('hidden');
  document.getElementById('message').textContent = '';
}
</script>
</body>
</html>
