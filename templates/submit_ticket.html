{% extends "layout.html" %}
{% block content %}
<script>
  (function() {
    const token = localStorage.getItem('token');
    if (!token) {
       window.location.href = "login.html";
    }
  })();
</script>

<style>
    /* Force body to ignore default margins and ensure nav is flush */
    body { margin: 0; padding: 0; }
    
    /* Ensure the nav links are perfectly identical across all pages */
    .nav-link {
        display: flex;
        align-items: center;
        padding-left: 0.75rem;
        padding-right: 0.75rem;
        padding-top: 0.5rem;
        padding-bottom: 0.5rem;
    }
</style>
<div class="mx-auto mt-12" style="max-width: 850px; width: 100%;"> 

    <div class="bg-[#00a3d1] text-white p-3 rounded-t-lg font-semibold shadow-sm">
        <i class="fa-solid fa-pen-to-square mr-2"></i> Raise a Support Ticket
    </div>

    <div class="bg-white p-6 border border-slate-200 rounded-b-lg shadow-sm">
        <form id="ticketForm" method="POST" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-4">
                    
                    <div id="adminProxyContainer" style="display: none;" class="mb-4 p-3 border rounded bg-light shadow-sm">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="ticketByRequestCheck">
                            <label class="form-check-label fw-bold text-muted small text-uppercase" for="ticketByRequestCheck" style="cursor: pointer;">
                                Ticket By Request
                            </label>
                        </div>
                        <div id="requestedForDiv" style="display: none; margin-top: 10px;">
                            <label class="form-label fw-bold text-muted small text-uppercase">Requested For (Username) *</label>
                            <input type="text" name="requested_for" id="requested_for_input" class="form-control" placeholder="Enter user's name">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted small text-uppercase">Category</label>
                        <select name="category" class="form-select">
                            <option>Problem</option>
                            <option>Request</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted small text-uppercase">Priority Level</label>
                        <select name="priority" class="form-select">
                            <option>Low</option>
                            <option>Medium</option>
                            <option>High</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted small text-uppercase">Target IT Group</label>
                        <select name="group" class="form-select">
                            <option>Accounts</option>
                            <option>PD</option>
                            <option>Sales</option>
                            <option>Folding</option>
                            <option>Stitching</option>
                            <option>Dying</option>
                            <option>Admin</option>
                            <option>Hr</option>
                            <option>Powerhouse</option>
                            <option>Yarn</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted small text-uppercase">Agent</label>
                        <select name="assigned_agent" class="form-select">
                            <option value="Nawab Khan">Nawab Khan</option>
                            <option value="IT Support">IT Support</option>
                        </select>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted small text-uppercase">Subject / Issue Title *</label>
                        <input type="text" name="subject" class="form-control" placeholder="Brief summary of the issue" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted small text-uppercase">Detailed Description (Optional)</label>
                        <textarea name="description" class="form-control" rows="6" placeholder="Please provide details to help us troubleshoot..."></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted small text-uppercase">Secure File Attachment</label>
                        <input type="file" name="file" class="form-control">
                        <div class="form-text text-muted">Permitted corporate system log files or diagnostic screenshots only.</div>
                    </div>
                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn text-white px-4 py-2" style="background-color: #008eb5;">
                            <i class="fa-solid fa-paper-plane me-2"></i>Submit Ticket
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
// Fail-safe Token Decoder to find user roles directly from the session token
try {
    const token = localStorage.getItem('token');
    if (token) {
        // Decode the middle payload section of the JWT token
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));

        const tokenData = JSON.parse(jsonPayload);
        
        // Check if the decoded role matches ADMINISTRATOR
        if (tokenData.role === 'ADMINISTRATOR') {
            document.getElementById('adminProxyContainer').style.display = 'block';
        }
    }
} catch (e) {
    console.error("Error parsing security token role:", e);
}

// Toggle username prompt visibility and dynamic field requirements
document.getElementById('ticketByRequestCheck').addEventListener('change', function() {
    const inputDiv = document.getElementById('requestedForDiv');
    const inputField = document.getElementById('requested_for_input');
    
    if (this.checked) {
        inputDiv.style.display = 'block';
        inputField.setAttribute('required', 'true');
    } else {
        inputDiv.style.display = 'none';
        inputField.removeAttribute('required');
        inputField.value = '';
    }
});

// Network Transport Layer: Ships standard fields alongside admin override values
document.getElementById('ticketForm').addEventListener('submit', async function(e) {
    e.preventDefault(); // Stop standard browser page-reload action
    
    const token = localStorage.getItem('token');
    const formData = new FormData(this);

    try {
        const res = await fetch('/api/tickets/submit', {
            method: 'POST',
            headers: { 
                'Authorization': `Bearer ${token}` 
            },
            body: formData
        });
        
        const data = await res.json();
        if (res.ok) {
            alert("✅ Ticket submitted successfully!");
            window.location.href = "view_tickets.html";
        } else {
            alert("❌ Submission Denied: " + (data.error || "Could not process request"));
        }
    } catch(err) {
        alert("CRITICAL: Failed to communicate with the secure ticketing database engine.");
    }
});
</script>
{% endblock %}
