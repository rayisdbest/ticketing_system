{% extends "layout.html" %}

{% block content %}
<h2 class="mt-4 mb-4">Dashboard</h2>

<div class="row">
    <div class="col-md-3">
        <div class="card p-3 shadow-sm border-primary">
            <h3 class="text-primary">{{ total }}</h3>
            <p class="text-muted mb-0">Total Received</p>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card p-3 shadow-sm border-warning">
            <h3 class="text-warning">{{ open }}</h3>
            <p class="text-muted mb-0">Unresolved</p>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card p-3 shadow-sm border-success">
            <h3 class="text-success">{{ resolved }}</h3>
            <p class="text-muted mb-0">Resolved</p>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-12">
        <div class="card p-4 shadow-sm">
            <h5>Tickets Overview</h5>
            <hr>
            <p>Visual reports will appear here.</p>
        </div>
    </div>
</div>
{% endblock %}
